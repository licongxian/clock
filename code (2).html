<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>翻牌时钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--sf:#1c1c1e;--ct:#2c2c2e;--cb:#1a1a1c;--cl:#080808;--cw:68px;--ch:100px;--cr:8px;--fs:66px;--dc:#e0e0e0;--cc:#48484a;--tx:#e0e0e0;--td:#636366;--ac:#0a84ff}
html,body{height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--tx);overflow:hidden;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
body{display:flex;align-items:center;justify-content:center}
#page{display:flex;flex-direction:column;align-items:center;gap:8px;transform-origin:center center;animation:pageIn .8s ease}
@keyframes pageIn{from{opacity:0}}
#clockGroup{display:flex;flex-direction:column;align-items:center;gap:10px}
.clock{display:flex;align-items:center;gap:8px}
.dg{display:flex;gap:4px}
.colon{display:flex;align-items:center;justify-content:center;height:var(--ch);width:24px;font-size:44px;font-weight:500;color:var(--cc);animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.15}}
.flip{position:relative;width:var(--cw);height:var(--ch);perspective:300px;border-radius:var(--cr)}
.face{position:absolute;left:0;right:0;height:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.face span{position:absolute;left:0;right:0;height:200%;display:flex;align-items:center;justify-content:center;font-size:var(--fs);font-weight:500;color:var(--dc);font-family:'DM Mono',monospace}
.face.top{top:0;background:var(--ct);border-radius:var(--cr) var(--cr) 0 0;border-bottom:1px solid var(--cl)}
.face.top span{top:0}
.face.bot{bottom:0;background:var(--cb);border-radius:0 0 var(--cr) var(--cr)}
.face.bot span{bottom:0}
.face.tf,.face.bf{display:none;z-index:2}
.face.tf{top:0;background:var(--ct);border-radius:var(--cr) var(--cr) 0 0;border-bottom:1px solid var(--cl);transform-origin:bottom center}
.face.tf span{top:0}
.face.bf{bottom:0;background:var(--cb);border-radius:0 0 var(--cr) var(--cr);transform-origin:top center;transform:rotateX(90deg)}
.face.bf span{bottom:0}
@keyframes foldCard{from{transform:rotateX(0deg)}to{transform:rotateX(-90deg)}}
@keyframes unfoldCard{from{transform:rotateX(90deg)}to{transform:rotateX(0deg)}}
.date{font-size:13px;color:var(--td);letter-spacing:2px}
.countdown{display:none;flex-direction:column;align-items:center;opacity:0;transform:translateY(-8px)}
.cd-time{font-size:24px;font-weight:400;color:var(--tx);letter-spacing:3px;padding:6px 18px;border-radius:8px;cursor:pointer;transition:background .2s;line-height:1.3}
.cd-time:hover{background:rgba(255,255,255,.05)}
.countdown.paused .cd-time{animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.15}50%{opacity:1}}
.countdown.done .cd-time{animation:flashDone .6s ease infinite alternate}
@keyframes flashDone{to{color:var(--ac)}}
.stopwatch{display:none;flex-direction:column;align-items:center;opacity:0;transform:translateY(-8px)}
.sw-time{font-size:24px;font-weight:400;color:var(--tx);letter-spacing:3px;padding:6px 18px;border-radius:8px;cursor:pointer;transition:background .2s;line-height:1.3;position:relative;border:1px solid rgba(255,255,255,.08)}
.sw-time:hover{background:rgba(255,255,255,.03)}
.stopwatch.paused .sw-time{animation:breathe 2.5s ease-in-out infinite}
.sw-controls{display:none;position:absolute;top:-9px;right:-9px;gap:4px;z-index:1}
.stopwatch.paused .sw-controls,.stopwatch.reset .sw-controls{display:flex}
.stopwatch.reset .sw-reset{display:none}
.sw-reset,.sw-x{width:18px;height:18px;border:none;border-radius:50%;background:rgba(40,40,40,.95);color:rgba(255,255,255,.45);font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:'DM Mono',monospace;transition:color .2s}
.sw-reset:hover,.sw-x:hover{color:rgba(255,255,255,.85)}
.menu-btn{position:fixed;top:20px;right:20px;width:42px;height:42px;border:none;border-radius:11px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s;z-index:100}
.menu-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.65)}
.menu-panel{position:fixed;top:70px;right:20px;background:rgba(28,28,30,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:12px;padding:4px;min-width:170px;z-index:100;opacity:0;transform:translateY(-8px) scale(.96);transform-origin:top right;transition:opacity .2s ease,transform .2s ease;pointer-events:none;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.menu-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.menu-item{padding:10px 14px;font-size:14px;color:var(--tx);border-radius:8px;cursor:pointer;transition:background .15s;font-family:'DM Mono',monospace;white-space:nowrap}
.menu-item:hover{background:rgba(255,255,255,.1)}
.menu-item.disabled{color:var(--td);pointer-events:none}
.menu-divider{height:1px;background:rgba(255,255,255,.06);margin:3px 10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-end;justify-content:center;z-index:200;pointer-events:none;transition:background .35s ease}
.overlay.open{background:rgba(0,0,0,.5);pointer-events:auto}
.sheet{width:100%;max-width:400px;background:var(--sf);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06);cursor:grab;touch-action:none;user-select:none}
.sheet-head:active{cursor:grabbing}
.sheet-btn{font-family:'DM Mono',monospace;font-size:14px;color:var(--ac);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .15s}
.sheet-btn:hover{background:rgba(10,132,255,.1)}
.sheet-btn.dim{color:var(--td)}
.sheet-title{font-size:15px;font-weight:500}
.picker-wrap{display:flex;align-items:center;justify-content:center;padding:24px 16px 40px;gap:2px}
.picker-col{width:68px;height:220px;overflow:hidden;position:relative;border-radius:8px;cursor:grab;touch-action:none;perspective:300px}
.picker-col:active{cursor:grabbing}
.picker-col::before,.picker-col::after{content:'';position:absolute;left:0;right:0;height:35%;pointer-events:none;z-index:3}
.picker-col::before{top:0;background:linear-gradient(to bottom,var(--sf),transparent)}
.picker-col::after{bottom:0;background:linear-gradient(to top,var(--sf),transparent)}
.wheel-hl{position:absolute;top:50%;left:6px;right:6px;height:44px;transform:translateY(-50%);border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);border-radius:8px;pointer-events:none;z-index:4;background:rgba(255,255,255,.025)}
.wheel-item{height:44px;position:absolute;left:0;right:0;display:none;align-items:center;justify-content:center;font-size:22px;font-weight:400;color:var(--td);font-family:'DM Mono',monospace;will-change:transform,opacity}
.picker-unit{font-size:13px;color:var(--td);margin:0 2px;padding-bottom:20px;align-self:flex-end}
.settings-body{padding:28px 24px 44px}
.setting-row{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.setting-row:last-child{margin-bottom:0}
.setting-label{font-size:14px;color:var(--tx);min-width:52px;white-space:nowrap}
.setting-val{font-size:13px;color:var(--td);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
input[type="range"]{-webkit-appearance:none;appearance:none;flex:1;height:28px;background:transparent;outline:none;margin:0;padding:0}
input[type="range"]::-webkit-slider-runnable-track{height:4px;background:#3a3a3c;border-radius:2px}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.45);margin-top:-12px}
input[type="range"]::-moz-range-track{height:4px;background:#3a3a3c;border-radius:2px;border:none}
input[type="range"]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 1px 5px rgba(0,0,0,.45)}

/* ====== SETTINGS DRAG STATE ====== */
/* 按住滑条时: sheet背景透明, 非活动行隐藏, 只留当前滑条 */
#settingsSheet{
  transition:transform .4s cubic-bezier(.32,.72,0,1), background .3s ease, box-shadow .3s ease;
}
#settingsSheet.s-dragging{
  transition:transform .4s cubic-bezier(.32,.72,0,1), background .12s ease, box-shadow .12s ease;
  background:transparent;
  box-shadow:none;
}
#settingsSheet .sheet-head{transition:opacity .3s ease}
#settingsSheet.s-dragging .sheet-head{transition:opacity .12s ease;opacity:0;pointer-events:none}
#settingsSheet .setting-row{transition:opacity .3s ease}
#settingsSheet.s-dragging .setting-row{transition:opacity .12s ease}
#settingsSheet.s-dragging .setting-row:not(.active){opacity:0;pointer-events:none}
#settingsSheet.s-dragging .setting-row.active .setting-label{color:rgba(255,255,255,.5)}
#settingsSheet.s-dragging .setting-row.active .setting-val{color:rgba(255,255,255,.3)}
</style>
</head>
<body>

<div id="page">
  <div id="clockGroup">
    <div class="clock">
      <div class="dg">
        <div class="flip" id="ht" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
        <div class="flip" id="ho" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
      </div>
      <div class="colon">:</div>
      <div class="dg">
        <div class="flip" id="mt" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
        <div class="flip" id="mo" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
      </div>
      <div class="colon">:</div>
      <div class="dg">
        <div class="flip" id="st" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
        <div class="flip" id="so" data-v=""><div class="face top"><span>0</span></div><div class="face bot"><span>0</span></div><div class="face tf"><span>0</span></div><div class="face bf"><span>0</span></div></div>
      </div>
    </div>
    <div class="date" id="dateLine"></div>
  </div>
  <div class="countdown" id="cd">
    <div class="cd-time" id="cdTime" title="点击暂停/继续">00:00</div>
  </div>
  <div class="stopwatch" id="sw">
    <div class="sw-time" id="swTime" title="点击暂停/继续">
      <span id="swText">00:00</span>
      <div class="sw-controls">
        <button class="sw-reset" id="swReset" title="清空">−</button>
        <button class="sw-x" id="swX" title="取消">×</button>
      </div>
    </div>
  </div>
</div>

<button class="menu-btn" id="menuBtn" title="菜单">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="4" r="1.3"/><circle cx="10" cy="10" r="1.3"/><circle cx="10" cy="16" r="1.3"/></svg>
</button>

<div class="menu-panel" id="menuPanel">
  <div class="menu-item" id="miAdd">添加倒计时</div>
  <div class="menu-item disabled" id="miCancel">取消倒计时</div>
  <div class="menu-item" id="miCdMS">倒计时毫秒: 关</div>
  <div class="menu-divider"></div>
  <div class="menu-item" id="miSW">开始计时</div>
  <div class="menu-item disabled" id="miSWStop">取消计时</div>
  <div class="menu-item" id="miSwMS">计时器毫秒: 关</div>
  <div class="menu-divider"></div>
  <div class="menu-item" id="mi12h">12小时制</div>
  <div class="menu-item" id="miDate">日期: 开</div>
  <div class="menu-divider"></div>
  <div class="menu-item" id="miSize">显示大小</div>
  <div class="menu-divider"></div>
  <div class="menu-item" id="miFS">全屏</div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-head" id="sheetHead">
      <button class="sheet-btn dim" id="sheetCancel">取消</button>
      <span class="sheet-title">设定倒计时</span>
      <button class="sheet-btn" id="sheetOk">确定</button>
    </div>
    <div class="picker-wrap">
      <div class="picker-col" id="pickH"></div><div class="picker-unit">时</div>
      <div class="picker-col" id="pickM"></div><div class="picker-unit">分</div>
      <div class="picker-col" id="pickS"></div><div class="picker-unit">秒</div>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="sheet" id="settingsSheet">
    <div class="sheet-head" id="settingsHead">
      <button class="sheet-btn dim" id="settingsClose">完成</button>
      <span class="sheet-title">显示大小</span>
      <button class="sheet-btn" id="settingsReset">重置</button>
    </div>
    <div class="settings-body">
      <div class="setting-row">
        <span class="setting-label">时钟</span>
        <input type="range" id="clockSlider" min="0.5" max="2" step="0.05" value="1">
        <span class="setting-val" id="clockVal">100%</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">倒计时</span>
        <input type="range" id="cdSlider" min="0.5" max="2" step="0.05" value="1">
        <span class="setting-val" id="cdVal">100%</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">计时器</span>
        <input type="range" id="swSlider" min="0.5" max="2" step="0.05" value="1">
        <span class="setting-val" id="swVal">100%</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
function pad(n){return String(n).padStart(2,'0')}
function fmtTime(ms,showMs){
  var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  var base=h>0?pad(h)+':'+pad(m)+':'+pad(ss):pad(m)+':'+pad(ss);
  if(showMs){var ml=Math.floor(ms%1000);return base+'.'+String(ml).padStart(3,'0')}
  return base;
}

/* ===== STATE ===== */
var is24h=true,cdShowMS=false,swShowMS=false;
var clockScale=1,cdScale=1,swScale=1,dateVisible=true,globalScale=1;
var cdState=0,cdEnd=0,cdPausedRem=0,cdIv=null,cdHideTm=null,cdVisible=false;
var swState=0,swStart=0,swPaused=0,swIv=null,swVisible=false;

/* ===== ELEMENTS ===== */
var page=document.getElementById('page'),clockGroup=document.getElementById('clockGroup');
var cdEl=document.getElementById('cd'),cdTimeEl=document.getElementById('cdTime');
var swEl=document.getElementById('sw'),swTextEl=document.getElementById('swText');
var dateEl=document.getElementById('dateLine');
var menuPanel=document.getElementById('menuPanel'),menuBtn=document.getElementById('menuBtn');
var miCancel=document.getElementById('miCancel');
var miSW=document.getElementById('miSW'),miSWStop=document.getElementById('miSWStop');
var miCdMS=document.getElementById('miCdMS'),miSwMS=document.getElementById('miSwMS');
var mi12h=document.getElementById('mi12h'),miDate=document.getElementById('miDate');
var miFS=document.getElementById('miFS'),miSize=document.getElementById('miSize');
var overlay=document.getElementById('overlay'),settingsOverlay=document.getElementById('settingsOverlay');
var settingsSheet=document.getElementById('settingsSheet');
var clockSlider=document.getElementById('clockSlider'),cdSlider=document.getElementById('cdSlider'),swSlider=document.getElementById('swSlider');
var clockValEl=document.getElementById('clockVal'),cdValEl=document.getElementById('cdVal'),swValEl=document.getElementById('swVal');
var cards=['ht','ho','mt','mo','st','so'].map(function(id){return document.getElementById(id)});

/* ===== RESCALE ===== */
function getCS(){var t=getComputedStyle(page).transform;if(!t||t==='none')return 1;var v=t.split(',').map(parseFloat);return Math.sqrt(v[0]*v[0]+v[1]*v[1])}
function rescale(anim){var r=page.getBoundingClientRect(),cs=getCS(),uw=r.width/cs,uh=r.height/cs,sx=(window.innerWidth-40)/uw,sy=(window.innerHeight-40)/uh,s=Math.min(sx,sy,1.8);s=Math.max(.3,s);globalScale=s;page.style.transition=anim?'transform .5s cubic-bezier(.175,.885,.32,1.275)':'none';page.style.transform='scale('+s+')'}

/* ===== FLIP CARD ===== */
function flipCard(el,v){var ov=el.dataset.v;if(ov===v)return;el.dataset.v=v;if(ov===''){el.querySelector('.top span').textContent=v;el.querySelector('.bot span').textContent=v;return}if(!el._fid)el._fid=0;var fid=++el._fid;var tS=el.querySelector('.top span'),bS=el.querySelector('.bot span'),tf=el.querySelector('.tf'),bf=el.querySelector('.bf');tf.style.cssText='display:none';bf.style.cssText='display:none';bf.style.transform='rotateX(90deg)';void el.offsetWidth;tS.textContent=v;tf.querySelector('span').textContent=ov;bf.querySelector('span').textContent=v;tf.style.cssText='display:flex;transform-origin:bottom center;animation:foldCard 0.3s ease-in forwards';setTimeout(function(){if(fid!==el._fid)return;bf.style.cssText='display:flex;transform-origin:top center;animation:unfoldCard 0.3s ease-out forwards'},300);setTimeout(function(){if(fid!==el._fid)return;bS.textContent=v;tf.style.cssText='display:none';bf.style.cssText='display:none';bf.style.transform='rotateX(90deg)'},600)}

/* ===== CLOCK ===== */
function tickClock(){var d=new Date(),h=d.getHours();if(!is24h)h=h%12||12;var v=pad(h)+pad(d.getMinutes())+pad(d.getSeconds());for(var i=0;i<6;i++)flipCard(cards[i],v[i])}
function updateDate(){var d=new Date(),w=['周日','周一','周二','周三','周四','周五','周六'];dateEl.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+w[d.getDay()]}

/* ===== MENU ===== */
var menuOpen=false;
function openMenu(){menuOpen=true;menuPanel.classList.add('open')}
function closeMenu(){menuOpen=false;menuPanel.classList.remove('open')}
menuBtn.addEventListener('click',function(e){e.stopPropagation();menuOpen?closeMenu():openMenu()});
document.addEventListener('click',function(e){if(menuOpen&&!menuPanel.contains(e.target)&&!menuBtn.contains(e.target))closeMenu()});

/* ===== SIZES ===== */
function applySizes(){clockGroup.style.zoom=clockScale;cdEl.style.zoom=cdScale;swEl.style.zoom=swScale;rescale(false)}
clockSlider.addEventListener('input',function(){clockScale=parseFloat(this.value);clockValEl.textContent=Math.round(clockScale*100)+'%';applySizes()});
cdSlider.addEventListener('input',function(){cdScale=parseFloat(this.value);cdValEl.textContent=Math.round(cdScale*100)+'%';applySizes()});
swSlider.addEventListener('input',function(){swScale=parseFloat(this.value);swValEl.textContent=Math.round(swScale*100)+'%';applySizes()});
document.getElementById('settingsReset').addEventListener('click',function(){clockScale=1;cdScale=1;swScale=1;clockSlider.value=1;cdSlider.value=1;swSlider.value=1;clockValEl.textContent='100%';cdValEl.textContent='100%';swValEl.textContent='100%';applySizes()});

/* ===== SETTINGS SLIDER DRAG — 按住时只显示当前滑条 ===== */
(function(){
  var rows=settingsSheet.querySelectorAll('.setting-row');
  rows.forEach(function(row){
    var s=row.querySelector('input[type="range"]');
    if(!s)return;
    function onStart(){
      settingsSheet.classList.add('s-dragging');
      row.classList.add('active');
    }
    s.addEventListener('mousedown',onStart);
    s.addEventListener('touchstart',onStart,{passive:true});
  });
  function onEnd(){
    settingsSheet.classList.remove('s-dragging');
    rows.forEach(function(r){r.classList.remove('active')});
  }
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);
})();

/* ===== WHEEL PICKER ===== */
function WheelPicker(el,min,max,init){this.el=el;this.min=min;this.max=max;this.N=max-min+1;this.IH=44;this.off=init*this.IH;this.vel=0;this.drag=false;this.lastY=0;this.hist=[];this.running=false;this._build();this._bind()}
WheelPicker.prototype={get val(){var i=Math.round(this.off/this.IH);return this.min+(((i%this.N)+this.N)%this.N)},set val(v){this.off=(v-this.min)*this.IH;this.vel=0;this._render()},start:function(){if(!this.running){this.running=true;this._loop()}},stop:function(){this.running=false},_build:function(){this.el.innerHTML='';var hl=document.createElement('div');hl.className='wheel-hl';this.el.appendChild(hl);this.els=[];for(var i=0;i<this.N;i++){var d=document.createElement('div');d.className='wheel-item';d.textContent=pad(this.min+i);this.el.appendChild(d);this.els.push(d)}this._render()},_render:function(){var IH=this.IH,cy=IH*2.5,raw=this.off/IH;for(var i=0;i<this.N;i++){var dd=i-raw;if(dd>this.N/2)dd-=this.N;if(dd<-this.N/2)dd+=this.N;if(Math.abs(dd)>4.5){this.els[i].style.display='none';continue}var y=cy-IH/2+dd*IH,ad=Math.abs(dd),rx=dd*20,op=Math.max(0,1-ad*.3),sc=1-ad*.06;var s=this.els[i].style;s.display='flex';s.top=y+'px';s.transform='rotateX('+rx+'deg) scale('+sc+')';s.opacity=op.toFixed(2);s.color=ad<.5?'#e0e0e0':'#636366'}},_loop:function(){if(!this.running)return;var self=this;if(!self.drag){if(Math.abs(self.vel)>.3){self.off+=self.vel;self.vel*=.93}else{var raw=self.off/self.IH,nearest=Math.round(raw);while(nearest-raw>self.N/2)nearest-=self.N;while(raw-nearest>self.N/2)nearest+=self.N;var target=nearest*self.IH;self.off+=(target-self.off)*.2;if(Math.abs(self.off-target)<.3){self.off=target;self.vel=0;self.off=((self.off%(self.N*self.IH))+self.N*self.IH)%(self.N*self.IH)}}}self._render();requestAnimationFrame(function(){self._loop()})},_bind:function(){var self=this;function gy(e){return e.touches?e.touches[0].clientY:e.clientY}function onStart(e){self.drag=true;self.lastY=gy(e);self.vel=0;self.hist=[{y:self.lastY,t:performance.now()}]}function onMove(e){if(!self.drag)return;e.preventDefault();var y=gy(e);self.off-=y-self.lastY;self.lastY=y;var now=performance.now();self.hist.push({y:y,t:now});if(self.hist.length>5)self.hist.shift();self._render()}function onEnd(){if(!self.drag)return;self.drag=false;var h=self.hist;if(h.length>=2){var dt=h[h.length-1].t-h[0].t,dy=h[h.length-1].y-h[0].y;if(dt>0&&dt<300)self.vel=Math.max(-50,Math.min(50,-dy/dt*16))}}self.el.addEventListener('mousedown',onStart);document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onEnd);self.el.addEventListener('touchstart',onStart,{passive:true});self.el.addEventListener('touchmove',onMove,{passive:false});self.el.addEventListener('touchend',onEnd);self.el.addEventListener('wheel',function(e){e.preventDefault();self.off+=e.deltaY*.5;self.vel=0;self._render()},{passive:false})}};

/* ===== PICKER MODAL ===== */
var pickersReady=false,pH,pM,pS;
function initPickers(){pH=new WheelPicker(document.getElementById('pickH'),0,23,0);pM=new WheelPicker(document.getElementById('pickM'),0,59,0);pS=new WheelPicker(document.getElementById('pickS'),0,59,0);pickersReady=true}
function openPicker(){closeMenu();overlay.classList.add('open');if(!pickersReady)initPickers();else{pH.val=0;pM.val=0;pS.val=0}pH.start();pM.start();pS.start()}
function closePicker(){overlay.classList.remove('open');if(pickersReady){pH.stop();pM.stop();pS.stop()}}
document.getElementById('miAdd').addEventListener('click',openPicker);
document.getElementById('sheetCancel').addEventListener('click',closePicker);
overlay.addEventListener('click',function(e){if(e.target===overlay)closePicker()});
document.getElementById('sheetOk').addEventListener('click',function(){var sec=pH.val*3600+pM.val*60+pS.val;if(sec>0)cdStart(sec);closePicker()});
(function(){var sh=document.getElementById('sheet'),head=document.getElementById('sheetHead'),drg=false,sy0=0,dy=0;function gy(e){return e.touches?e.touches[0].clientY:e.clientY}function onS(e){drg=true;sy0=gy(e);dy=0;sh.style.transition='none'}function onM(e){if(!drg)return;dy=Math.max(0,gy(e)-sy0);sh.style.transform='translateY('+dy+'px)'}function onE(){if(!drg)return;drg=false;sh.style.transition='';if(dy>80)closePicker();else sh.style.transform='';dy=0}head.addEventListener('mousedown',onS);document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onE);head.addEventListener('touchstart',onS,{passive:true});document.addEventListener('touchmove',onM,{passive:true});document.addEventListener('touchend',onE)})();

/* ===== DATE TOGGLE ===== */
miDate.addEventListener('click',function(){closeMenu();dateVisible=!dateVisible;miDate.textContent=dateVisible?'日期: 开':'日期: 关';if(dateVisible){dateEl.style.transition='none';dateEl.style.display='';dateEl.style.opacity='0';dateEl.style.transform='translateY(-6px)';void dateEl.offsetHeight;rescale(true);dateEl.style.transition='opacity .4s ease,transform .4s ease';dateEl.style.opacity='1';dateEl.style.transform='translateY(0)'}else{dateEl.style.transition='opacity .2s ease';dateEl.style.opacity='0';setTimeout(function(){dateEl.style.display='none';rescale(true)},230)}});

/* ===== COUNTDOWN ===== */
function cdStart(sec){if(cdHideTm){clearTimeout(cdHideTm);cdHideTm=null}if(cdIv){clearInterval(cdIv);cdIv=null}cdPausedRem=sec*1000;cdState=1;cdEnd=Date.now()+sec*1000;cdEl.classList.remove('paused','done');cdEl.style.transition='none';cdEl.style.display='flex';cdEl.style.zoom=cdScale;cdEl.style.opacity='0';cdEl.style.transform='translateY(-8px)';cdVisible=true;void cdEl.offsetHeight;rescale(true);cdEl.style.transition='opacity .4s ease,transform .5s cubic-bezier(.175,.885,.32,1.275)';cdEl.style.opacity='1';cdEl.style.transform='translateY(0)';cdUpdate();cdIv=setInterval(cdUpdate,cdShowMS?50:200);miCancel.classList.remove('disabled')}
function cdUpdate(){if(cdState!==1)return;var remMs=Math.max(0,cdEnd-Date.now());cdPausedRem=remMs;if(remMs<=0){clearInterval(cdIv);cdIv=null;cdState=3;cdTimeEl.textContent=fmtTime(0,cdShowMS);cdEl.classList.add('done');cdHideTm=setTimeout(cdStop,5000);return}cdTimeEl.textContent=fmtTime(remMs,cdShowMS)}
function cdHide(){cdEl.style.transition='opacity .25s ease';cdEl.style.opacity='0';cdHideTm=setTimeout(function(){cdHideTm=null;cdEl.style.display='none';cdVisible=false;rescale(true)},280)}
function cdStop(){if(cdIv){clearInterval(cdIv);cdIv=null}if(cdHideTm){clearTimeout(cdHideTm);cdHideTm=null}cdState=0;cdPausedRem=0;cdEl.classList.remove('paused','done');cdHide();miCancel.classList.add('disabled')}
function cdToggle(){if(cdState===3){cdStop();return}if(cdState===1){cdState=2;clearInterval(cdIv);cdIv=null;cdPausedRem=cdEnd-Date.now();cdEl.classList.add('paused')}else if(cdState===2){cdState=1;cdEnd=Date.now()+cdPausedRem;cdEl.classList.remove('paused');cdUpdate();cdIv=setInterval(cdUpdate,cdShowMS?50:200)}}
cdTimeEl.addEventListener('click',cdToggle);miCancel.addEventListener('click',function(){closeMenu();cdStop()});

/* ===== STOPWATCH ===== */
function swStartFn(){if(swIv){clearInterval(swIv);swIv=null}swStart=Date.now();swPaused=0;swState=1;swEl.classList.remove('paused','reset');if(!swVisible){swEl.style.transition='none';swEl.style.display='flex';swEl.style.zoom=swScale;swEl.style.opacity='0';swEl.style.transform='translateY(-8px)';swVisible=true;void swEl.offsetHeight;rescale(true);swEl.style.transition='opacity .4s ease,transform .5s cubic-bezier(.175,.885,.32,1.275)';swEl.style.opacity='1';swEl.style.transform='translateY(0)'}swUpdate();swIv=setInterval(swUpdate,swShowMS?50:200);miSWStop.classList.remove('disabled');miSW.classList.add('disabled')}
function swUpdate(){if(swState!==1)return;swTextEl.textContent=fmtTime(Date.now()-swStart,swShowMS)}
function swHide(){if(!swVisible)return;swEl.style.transition='opacity .25s ease';swEl.style.opacity='0';setTimeout(function(){swEl.style.display='none';swVisible=false;swEl.classList.remove('reset');rescale(true)},280)}
function swStopFn(){if(swIv){clearInterval(swIv);swIv=null}swState=0;swPaused=0;swStart=0;swEl.classList.remove('paused','reset');swHide();miSWStop.classList.add('disabled');miSW.classList.remove('disabled')}
function swResetFn(){if(swIv){clearInterval(swIv);swIv=null}swPaused=0;swStart=0;swState=3;swEl.classList.remove('paused');swEl.classList.add('reset');swTextEl.textContent=fmtTime(0,swShowMS)}
function swToggle(){if(swState===1){swPaused=Date.now()-swStart;swState=2;clearInterval(swIv);swIv=null;swEl.classList.add('paused')}else if(swState===2){swStart=Date.now()-swPaused;swState=1;swEl.classList.remove('paused');swUpdate();swIv=setInterval(swUpdate,swShowMS?50:200)}}
document.getElementById('swTime').addEventListener('click',function(e){if(e.target.closest('.sw-controls'))return;if(swState===1||swState===2)swToggle();else if(swState===3)swStartFn()});
document.getElementById('swX').addEventListener('click',function(e){e.stopPropagation();swStopFn()});
document.getElementById('swReset').addEventListener('click',function(e){e.stopPropagation();swResetFn()});
miSW.addEventListener('click',function(){closeMenu();if(swState===0||swState===3)swStartFn()});
miSWStop.addEventListener('click',function(){closeMenu();swStopFn()});

/* ===== MS TOGGLES ===== */
miCdMS.addEventListener('click',function(){closeMenu();cdShowMS=!cdShowMS;miCdMS.textContent=cdShowMS?'倒计时毫秒: 开':'倒计时毫秒: 关';if(cdState===1){clearInterval(cdIv);cdIv=setInterval(cdUpdate,cdShowMS?50:200);cdUpdate()}if(cdState===3)cdTimeEl.textContent=fmtTime(0,cdShowMS)});
miSwMS.addEventListener('click',function(){closeMenu();swShowMS=!swShowMS;miSwMS.textContent=swShowMS?'计时器毫秒: 开':'计时器毫秒: 关';if(swState===1){clearInterval(swIv);swIv=setInterval(swUpdate,swShowMS?50:200);swUpdate()}if(swState===2)swTextEl.textContent=fmtTime(swPaused,swShowMS);if(swState===3)swTextEl.textContent=fmtTime(0,swShowMS)});

tickClock();updateDate();setInterval(function(){tickClock();updateDate()},1000);rescale(false);document.fonts.ready.then(function(){setTimeout(function(){rescale(false)},50)});window.addEventListener('resize',function(){rescale(false)});
